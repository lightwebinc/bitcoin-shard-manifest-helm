name: lint

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: helm lint (defaults)
        run: helm lint .

      - name: helm lint (strict)
        run: helm lint . --strict

      - name: helm template (defaults)
        run: |
          helm template t . --debug > /tmp/render.yaml
          test -s /tmp/render.yaml
          grep -q "kind: Deployment" /tmp/render.yaml
          grep -q "kind: Service" /tmp/render.yaml
          grep -q "kind: ServiceAccount" /tmp/render.yaml

      - name: helm template (multus + ServiceMonitor + PDB + NetworkPolicy)
        run: |
          helm template t . \
            --set networking.mode=multus \
            --set metrics.serviceMonitor.enabled=true \
            --set podDisruptionBudget.enabled=true \
            --set networkPolicy.enabled=true \
            --set manifest.shardBits=4 \
            --set manifest.joinedGroups=all \
            --set manifest.roleHint=proxy \
            --debug > /tmp/render-full.yaml
          grep -q "kind: ServiceMonitor" /tmp/render-full.yaml
          grep -q "kind: PodDisruptionBudget" /tmp/render-full.yaml
          grep -q "kind: NetworkPolicy" /tmp/render-full.yaml
          grep -q "k8s.v1.cni.cncf.io/networks" /tmp/render-full.yaml

      - name: helm template (host network)
        run: |
          helm template t . --set networking.mode=host --debug > /tmp/render-host.yaml
          grep -q "hostNetwork: true" /tmp/render-host.yaml
